    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Nexo Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Brittany+Signature&family=Inter:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-brittany {
        font-family: 'Brittany Signature', cursive;
      }
      .font-typewriter {
        font-family: 'Special Elite', monospace;
      }
      .font-display {
        font-family: 'Bebas Neue', sans-serif;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      .cursor-blink {
        animation: blink 1s step-end infinite;
      }
      @keyframes pulse-once {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      .animate-pulse-once {
        animation: pulse-once 0.5s ease-in-out;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin 10s linear infinite;
      }
      @keyframes tremble-subtle {
        0%, 15%, 80%, 86%, 100% { transform: translate(0, 0) rotate(0); }
        5% { transform: translate(-0.4px, 0.4px) rotate(-0.14deg); }
        10% { transform: translate(0.4px, -0.4px) rotate(0.14deg); }
        82% { transform: translate(0.3px, -0.3px) rotate(0.07deg); }
        84% { transform: translate(-0.3px, 0.3px) rotate(-0.07deg); }
      }
      .animate-tremble {
        animation: tremble-subtle 4s ease-in-out infinite;
      }
    </style>
